<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo-Webseite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-200: #bfdbfe;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --blue-900: #1e3a5f;
            --slate-50: #f8fafc;
            --slate-300: #cbd5e1;
            --slate-500: #64748b;
            --slate-700: #334155;
            --slate-800: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--blue-50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle geometric dot pattern */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--blue-200) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.5;
            pointer-events: none;
        }

        .card {
            background: white;
            border: 1px solid var(--blue-200);
            border-radius: 16px;
            box-shadow:
                0 1px 3px rgba(37, 99, 235, 0.06),
                0 8px 32px rgba(37, 99, 235, 0.08);
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            position: relative;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 56px;
            height: 56px;
            background: var(--blue-100);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .icon svg {
            width: 28px;
            height: 28px;
            color: var(--blue-600);
        }

        h1 {
            font-weight: 700;
            font-size: 1.75rem;
            color: var(--slate-800);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
        }

        p {
            font-weight: 300;
            font-size: 1.05rem;
            color: var(--slate-500);
            line-height: 1.7;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .divider {
            width: 48px;
            height: 3px;
            background: var(--blue-400);
            border-radius: 2px;
            margin: 24px auto;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
        }

        .meta {
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--slate-300);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5a17.92 17.92 0 0 1-8.716-2.247m0 0A8.966 8.966 0 0 1 3 12c0-1.264.26-2.467.732-3.558" />
            </svg>
        </div>
        <h1>Willkommen zur Demo-Seite</h1>
        <p>Diese statische Webseite wurde mit Terraform auf AWS S3 bereitgestellt und dient zu Test- und Demonstrationszwecken.</p>
        <div class="divider"></div>
        <span class="meta">Terraform &middot; AWS S3 &middot; Static Hosting</span>
    </div>
</body>
</html>
