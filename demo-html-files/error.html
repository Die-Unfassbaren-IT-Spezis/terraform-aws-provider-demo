<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fehler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-200: #bfdbfe;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --blue-900: #1e3a5f;
            --red-100: #fee2e2;
            --red-500: #ef4444;
            --red-600: #dc2626;
            --slate-50: #f8fafc;
            --slate-300: #cbd5e1;
            --slate-500: #64748b;
            --slate-700: #334155;
            --slate-800: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--blue-50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Same dot pattern as index, but slightly more muted */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--blue-200) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.35;
            pointer-events: none;
        }

        .card {
            background: white;
            border: 1px solid var(--blue-200);
            border-radius: 16px;
            box-shadow:
                0 1px 3px rgba(37, 99, 235, 0.06),
                0 8px 32px rgba(37, 99, 235, 0.08);
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            position: relative;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 56px;
            height: 56px;
            background: var(--red-100);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .icon svg {
            width: 28px;
            height: 28px;
            color: var(--red-500);
        }

        .error-code {
            font-weight: 700;
            font-size: 3.5rem;
            color: var(--slate-800);
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 8px;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
        }

        h1 {
            font-weight: 500;
            font-size: 1.25rem;
            color: var(--red-600);
            margin-bottom: 16px;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        p {
            font-weight: 300;
            font-size: 1.05rem;
            color: var(--slate-500);
            line-height: 1.7;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
        }

        .divider {
            width: 48px;
            height: 3px;
            background: var(--red-500);
            border-radius: 2px;
            margin: 24px auto;
            opacity: 0.5;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        .meta {
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--slate-300);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
            </svg>
        </div>
        <div class="error-code" id="errorCode">Fehler</div>
        <h1 id="errorMessage">Etwas ist schiefgelaufen</h1>
        <p id="errorDescription">Ein unerwarteter Fehler ist aufgetreten. Bitte versuchen Sie es sp&auml;ter erneut oder wenden Sie sich an den Support, falls das Problem weiterhin besteht.</p>
        <div class="divider"></div>
        <span class="meta">Terraform &middot; AWS S3 &middot; Static Hosting</span>
    </div>
</body>
</html>
