<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .error-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
            max-width: 500px;
        }
        .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin: 0;
        }
        .error-message {
            font-size: 24px;
            color: #333;
            margin: 16px 0;
        }
        .error-description {
            font-size: 16px;
            color: #666;
            margin: 16px 0 32px 0;
            line-height: 1.6;
        }
        .error-link {
            display: inline-block;
            background-color: #667eea;
            color: white;
            padding: 12px 28px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .error-link:hover {
            background-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code" id="errorCode">Error</h1>
        <h2 class="error-message" id="errorMessage">Something went wrong</h2>
        <p class="error-description" id="errorDescription">
            An unexpected error occurred. Please try again later or contact support if the problem persists.
        </p>
        <a href="/" class="error-link">Go Home</a>
    </div>
</body>
</html>
